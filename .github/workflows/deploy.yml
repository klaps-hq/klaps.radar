name: Build & Deploy

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ${{ secrets.IMAGE_NAME }}

jobs:
  # ───────────────────────────────────────────────
  # Job 1: Typecheck
  # ───────────────────────────────────────────────
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun node_modules/typescript/bin/tsc --noEmit

  # ───────────────────────────────────────────────
  # Job 2: Build Docker image and push to GHCR
  # ───────────────────────────────────────────────
  build-and-push:
    runs-on: ubuntu-latest
    needs: typecheck
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  # ───────────────────────────────────────────────
  # Job 3: Deploy to VPS
  # ───────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy docker-compose.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: docker-compose.yml
          target: ${{ secrets.PROJECT_DIR }}/radar

      - name: Deploy on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            mkdir -p ${{ secrets.PROJECT_DIR }}/radar
            cd ${{ secrets.PROJECT_DIR }}/radar

            # Generate .env from GitHub Secrets. INSTAGRAM_ACCESS_TOKEN only
            # seeds the first run - the refreshed token lives on the volume.
            cat > .env <<EOF
            NODE_ENV=production
            API_URL=${{ secrets.API_URL }}
            INTERNAL_API_KEY=${{ secrets.INTERNAL_API_KEY }}
            INSTAGRAM_ACCESS_TOKEN=${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
            INSTAGRAM_USER_ID=${{ secrets.INSTAGRAM_USER_ID }}
            IG_POST_CRON=${{ secrets.IG_POST_CRON }}
            IG_STORY_CRON=${{ secrets.IG_STORY_CRON }}
            IMAGE_NAME=${{ secrets.IMAGE_NAME }}
            IMAGE_TAG=latest
            CONTAINER_NAME=klaps-radar-prod
            EOF

            # Log in to GHCR on the server
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Remove old image to avoid corrupted layer cache
            docker rmi ${{ env.IMAGE_NAME }}:latest 2>/dev/null || true

            # Pull the latest image
            docker pull ${{ env.IMAGE_NAME }}:latest

            # Recreate the radar container
            docker compose -p klaps-radar-prod up -d --force-recreate --no-deps

            # Clean up dangling images
            docker image prune -f
