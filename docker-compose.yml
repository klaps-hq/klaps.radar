services:
  klaps-radar:
    image: ${IMAGE_NAME}:${IMAGE_TAG:-latest}
    container_name: ${CONTAINER_NAME:-klaps-radar}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Refreshed tokens live on the volume, surviving redeploys; the
      # *_ACCESS_TOKEN values from .env only seed the first run.
      - INSTAGRAM_TOKEN_FILE=/data/instagram-token
      - THREADS_TOKEN_FILE=/data/threads-token
    volumes:
      - radar_data:/data

volumes:
  radar_data:
